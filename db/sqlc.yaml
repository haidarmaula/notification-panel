version: "2"

sql:
  - engine: "postgresql"

    schema:
      - "./migrations"

    queries:
      - "./queries"

    gen:
      go:
        package: "sqlc"
        out: "../internal/database/sqlc"
        sql_package: "pgx/v5"
        emit_prepared_queries: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_interface: true
        emit_json_tags: false
        emit_db_tags: true
